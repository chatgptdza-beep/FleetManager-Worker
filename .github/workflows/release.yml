name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore FleetManager.Agent/FleetManager.Agent.csproj

      - name: Build
        run: dotnet build FleetManager.Agent/FleetManager.Agent.csproj -c Release --no-restore

      - name: Publish linux-x64
        run: |
          dotnet publish FleetManager.Agent/FleetManager.Agent.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -o publish/linux-x64 \
            --no-restore

      - name: Package linux-x64
        run: |
          cd publish/linux-x64
          zip -r ../../agent-linux-x64.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-linux-x64
          path: agent-linux-x64.zip
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: agent-linux-x64.zip
          generate_release_notes: true
